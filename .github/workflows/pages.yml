name: Deploy GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install nbconvert jupyter

      - name: Convert notebooks to HTML
        run: |
          mkdir -p _site
          find . -name "*.ipynb" -not -path './.git/*' | sort | while IFS= read -r nb; do
            rel="${nb#./}"
            outdir="_site/$(dirname "$rel")"
            mkdir -p "$outdir"
            jupyter nbconvert --to html --template classic "$nb" --output-dir="$outdir" --no-input 2>/dev/null
            echo "  ✓ $rel"
          done

      - name: Build index page
        run: |
          python3 << 'PYEOF'
          import os

          weeks = [("Week1", "经典机器学习"), ("Week2", "神经网络与 CNN"),
                   ("Week3", "序列模型 & Transformer"), ("Week4", "预训练 & 多模态"),
                   ("Week5", "实战 & 部署")]

          html = '''<!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>深度学习 · NLP 与多模态学习路线</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 960px; margin: 0 auto; padding: 2rem 1rem; background: #f8f9fa; color: #1a1a2e; line-height: 1.6; }
              h1 { font-size: 2rem; border-bottom: 3px solid #4361ee; padding-bottom: .5rem; }
              h2 { font-size: 1.3rem; margin-top: 2rem; color: #4361ee; }
              h2 span { background: #4361ee; color: #fff; font-size: .8rem; padding: 2px 8px; border-radius: 10px; margin-right: 8px; }
              .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
              .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: .6rem 1rem; }
              .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
              .card .title { font-weight: 600; }
              .card .files { font-size: .8rem; color: #666; margin-top: 4px; }
              .card .files a { color: #4361ee; text-decoration: none; display: inline-block; margin: 2px 0; }
              .card .files a:hover { text-decoration: underline; }
              .meta { color: #666; font-size: .9rem; margin: 1rem 0 2rem; }
              .footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #ddd; font-size: .85rem; color: #888; }
            </style>
          </head>
          <body>
            <h1>🧠 深度学习 · NLP 与多模态学习路线</h1>
            <p class="meta">从线性回归到 Stable Diffusion · 35 天完整学习记录</p>
          '''

          for week_key, week_name in weeks:
              if not os.path.isdir(week_key):
                  continue
              html += f'<h2><span>{week_key}</span>{week_name}</h2>\n<div class="grid">\n'
              days = sorted([d for d in os.listdir(week_key) if d.startswith("Day")])
              for day in days:
                  day_path = os.path.join(week_key, day)
                  if not os.path.isdir(day_path):
                      continue
                  notebooks = sorted([f for f in os.listdir(day_path) if f.endswith(".ipynb")])
                  if not notebooks:
                      continue
                  html += f'<div class="card"><div class="title">{day}</div><div class="files">\n'
                  for nb in notebooks:
                      nb_name = nb.replace(".ipynb", "")
                      html_path = f"{week_key}/{day}/{nb.replace('.ipynb', '.html')}"
                      html += f'<a href="{html_path}">{nb_name}</a><br>\n'
                  html += '</div></div>\n'
              html += '</div>\n'

          html += '''<div class="footer">
              <p><a href="https://github.com/hyyhyy07/deep-learning-nlp-multimodal-cornerstone-journey">GitHub 仓库</a> · 由 GitHub Actions 自动构建</p>
            </div>
          </body>
          </html>'''

          with open("_site/index.html", "w", encoding="utf-8") as f:
              f.write(html)
          print("  ✓ index page built")
          PYEOF

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
